# Cloudflare Worker config for the Polarsteps proxy (see NEXTSTOP_SETUP.md).
#   deploy:      npx wrangler deploy
#   set secret:  npx wrangler secret put POLARSTEPS_REMEMBER_TOKEN
name = "polarsteps-proxy"
main = "worker.js"
compatibility_date = "2026-07-01"

[vars]
POLARSTEPS_USERNAME = "your-polarsteps-username"
